<div class="dashboard-container">
  <header class="dashboard-header">
    <h1>Upcoming Races</h1>
    <p>Live odds from NG-stable</p>
  </header>

  @if (racingService.isLoading()) {
    <span>Fetching Races....</span>
  }
  @if (racingService.error()) {
    <div class="error-message">Failed to load races.</div>
  }

  <div class="race-grid" [class.is-refreshing]="racingService.isLoading()">
    @for (race of racingService.races(); track race.id) {
      <app-race-card [race]="race" />
    }
  </div>
</div>
